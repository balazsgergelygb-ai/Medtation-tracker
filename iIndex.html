<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Meditation Tracker Mobile</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;touch-action:pan-y}
body{
background:linear-gradient(180deg,#fff4e6,#ffe8cc);
color:#111827;
transition:.3s;
}
body.dark{background:linear-gradient(180deg,#0f172a,#111827);color:#f3f4f6}
.clouds{position:fixed;inset:0;pointer-events:none;opacity:.08}
.cloud,.cloud:before,.cloud:after{
position:absolute;border-radius:999px;background:white;
}
.cloud{width:90px;height:28px}
.cloud:before{content:"";width:34px;height:34px;left:12px;top:-12px}
.cloud:after{content:"";width:42px;height:42px;right:10px;top:-18px}
.c1{top:12%;left:10%}.c2{top:22%;right:12%;transform:scale(.7)}
body.dark .cloud,body.dark .cloud:before,body.dark .cloud:after{background:#cbd5e1}

.app{
height:100dvh;
padding:calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 12px);
display:flex;
flex-direction:column;
gap:14px;
max-width:430px;
margin:auto;
}

.top{display:flex;justify-content:space-between;align-items:center}
.iconbtn{
width:44px;height:44px;border-radius:50%;
border:1px solid rgba(0,0,0,.08);
background:rgba(255,255,255,.5);
backdrop-filter:blur(10px);
display:flex;align-items:center;justify-content:center;
}
body.dark .iconbtn{background:rgba(255,255,255,.06);border-color:rgba(255,255,255,.08)}
.card{
background:rgba(255,255,255,.55);
backdrop-filter:blur(12px);
border-radius:22px;padding:18px;
}
body.dark .card{background:rgba(255,255,255,.05)}
.streak{font-size:32px;font-weight:700}
.sub{opacity:.6;margin-top:4px}

.chart-card{flex:1;display:flex;flex-direction:column;justify-content:center}
.chart{
height:280px;
display:flex;
align-items:flex-end;
gap:8px;
}
.bar-wrap{flex:1;display:flex;flex-direction:column;justify-content:flex-end;align-items:center;height:100%}
.bar{
width:100%;
border-radius:10px 10px 0 0;
background:linear-gradient(#6366f1,#4f46e5);
min-height:6px;
}
.label{font-size:11px;margin-top:8px;opacity:.6}

.bottom{
display:flex;
gap:10px;
}
button.main{
flex:1;
height:54px;
border:none;
border-radius:16px;
background:#6366f1;
color:white;
font-weight:600;
}
svg{width:22px;height:22px}
</style>
</head>
<body>
<div class="clouds">
<div style="position:absolute;top:8%;right:14%;width:60px;height:60px;border-radius:50%;background:#ffd166;opacity:.55"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>
</div>

<div class="app">
<div class="top">
<button class="iconbtn" id="themeBtn">
<svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
</button>
<div style="font-weight:700">Meditation</div>
<div style="width:44px"></div>
</div>

<div class="card">
<div class="streak" id="streak">0 Day Streak</div>
<div class="sub">Keep going</div>
</div>

<div class="card chart-card">
<div id="weekTotal" style="font-size:26px;font-weight:700;margin-bottom:12px">0 min</div>
<div class="chart" id="chart"></div>
</div>

<div class="bottom">
<button class="main" onclick="addSession()">Add Session</button>
</div>
</div>

<script>
let sessions=JSON.parse(localStorage.getItem('meditationSessions')||'[]');
let dark=JSON.parse(localStorage.getItem('darkMode')||'false');

function icon(){
document.getElementById('themeIcon').innerHTML=dark
? '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>'
: '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>';
}
function render(){
document.body.classList.toggle('dark',dark);
icon();

const days=['H','K','Sze','Cs','P','Szo','V'];
const week=[];
const now=new Date();
const monday=new Date(now);
monday.setDate(now.getDate()-((now.getDay()+6)%7));

for(let i=0;i<7;i++){
const d=new Date(monday);
d.setDate(monday.getDate()+i);
const key=d.toISOString().split('T')[0];
const s=sessions.find(x=>x.date===key);
week.push({day:days[i],minutes:s?s.minutes:0});
}

const total=week.reduce((a,b)=>a+b.minutes,0);
document.getElementById('weekTotal').textContent=total+' min this week';

const max=Math.max(...week.map(x=>x.minutes),30);

document.getElementById('chart').innerHTML=week.map((d,i)=>

`<div class="bar-wrap" onpointerdown="startPress(${i})" onpointerup="cancelPress()" onpointerleave="cancelPress()">
<div class="bar" style="height:${(d.minutes/max)*220}px"></div>
<div class="label">${d.day}</div>
</div>`).join('');

let streak=0;
let c=new Date();
for(let i=0;i<365;i++){
const k=c.toISOString().split('T')[0];
if(!sessions.find(x=>x.date===k && x.minutes>0)) break;
streak++;
c.setDate(c.getDate()-1);
}
document.getElementById('streak').textContent=streak+' Day Streak';

localStorage.setItem('darkMode',JSON.stringify(dark));
localStorage.setItem('meditationSessions',JSON.stringify(sessions));
}

document.getElementById('themeBtn').onclick=()=>{dark=!dark;render()}


let pressTimer=null;
function startPress(idx){
 pressTimer=setTimeout(()=>editDay(idx),700);
}
function cancelPress(){
 clearTimeout(pressTimer);
}
function editDay(idx){
 const now=new Date();
 const monday=new Date(now);
 monday.setDate(now.getDate()-((now.getDay()+6)%7));
 const d=new Date(monday);
 d.setDate(monday.getDate()+idx);
 const key=d.toISOString().split('T')[0];
 const existing=sessions.find(x=>x.date===key);
 const val=prompt('Modify minutes', existing?existing.minutes:0);
 if(val===null) return;
 sessions=sessions.filter(x=>x.date!==key);
 if(Number(val)>0){ sessions.push({date:key,minutes:Number(val)}); }
 render();
}

function addSession(){
const m=prompt('Minutes?');
if(!m) return;
const key=new Date().toISOString().split('T')[0];
sessions=sessions.filter(x=>x.date!==key);
sessions.push({date:key,minutes:Number(m)});
render();
}

render();
</script>
</body>
</html>
