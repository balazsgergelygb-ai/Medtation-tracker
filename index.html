<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Meditation Tracker</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  -webkit-user-select: none;
  user-select: none;
}

body {
  background: linear-gradient(180deg, #fff9f0 0%, #ffe8d6 100%);
  color: #1a202c;
  transition: all 0.5s ease;
  position: relative;
}

body.dark {
  background: linear-gradient(180deg, #0a0f1a 0%, #10141f 100%);
  color: #f3f4f6;
}

/* Floating clouds */
.clouds {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  pointer-events: none;
  z-index: 0;
}

.cloud-shape, .cloud-shape::before, .cloud-shape::after {
  position: absolute;
  border-radius: 999px;
  background: white;
}

.cloud-shape {
  width: 90px;
  height: 28px;
  animation: drift 60s linear infinite;
}

.cloud-shape::before {
  content: "";
  width: 34px;
  height: 34px;
  left: 12px;
  top: -12px;
}

.cloud-shape::after {
  content: "";
  width: 42px;
  height: 42px;
  right: 10px;
  top: -18px;
}

body.dark .cloud-shape,
body.dark .cloud-shape::before,
body.dark .cloud-shape::after {
  background: #cbd5e1;
  opacity: 0.15;
}

.cloud-shape {
  opacity: 0.12;
}

.c1 {
  top: 15%;
  left: 5%;
  animation-duration: 70s;
}

.c2 {
  top: 30%;
  right: 8%;
  transform: scale(0.8);
  animation-duration: 80s;
  animation-delay: 10s;
}

.c3 {
  bottom: 20%;
  left: 10%;
  transform: scale(0.9);
  animation-duration: 90s;
  animation-delay: 20s;
}

@keyframes drift {
  from {
    transform: translateX(0);
  }
  to {
    transform: translateX(100vw);
  }
}

.app {
  height: 100dvh;
  padding: calc(env(safe-area-inset-top) + 12px) 16px calc(env(safe-area-inset-bottom) + 12px);
  display: flex;
  flex-direction: column;
  gap: 14px;
  max-width: 430px;
  margin: 0 auto;
  position: relative;
  z-index: 10;
}

.top {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 4px;
}

.iconbtn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1.5px solid rgba(0, 0, 0, 0.08);
  background: rgba(255, 255, 255, 0.5);
  backdrop-filter: blur(10px);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.3s ease;
  color: #1a202c;
}

body.dark .iconbtn {
  background: rgba(255, 255, 255, 0.06);
  border-color: rgba(255, 255, 255, 0.1);
  color: #f3f4f6;
}

.iconbtn:active {
  transform: scale(0.95);
}

.app-title {
  font-weight: 700;
  font-size: 16px;
  letter-spacing: -0.3px;
}

.card {
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(12px);
  border-radius: 22px;
  padding: 20px;
  border: 1px solid rgba(255, 255, 255, 0.3);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
}

body.dark .card {
  background: rgba(255, 255, 255, 0.04);
  border-color: rgba(255, 255, 255, 0.08);
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

.streak {
  font-size: 32px;
  font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 4px;
}

.sub {
  opacity: 0.6;
  font-size: 13px;
  font-weight: 500;
}

.week-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  padding: 0 4px;
}

.nav-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(10px);
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.3s ease;
  font-size: 16px;
  color: #6366f1;
  border: 1.5px solid rgba(99, 102, 241, 0.2);
}

body.dark .nav-btn {
  background: rgba(255, 255, 255, 0.05);
  color: #a78bfa;
  border-color: rgba(167, 139, 250, 0.2);
}

.nav-btn:active {
  transform: scale(0.9);
}

.week-info {
  flex: 1;
  text-align: center;
}

.week-label {
  font-size: 12px;
  font-weight: 600;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}

.week-total {
  font-size: 24px;
  font-weight: 700;
  color: #6366f1;
  letter-spacing: -0.3px;
}

body.dark .week-total {
  color: #a78bfa;
}

.chart-card {
  flex: 1;
  display: flex;
  flex-direction: column;
}

.chart {
  height: 200px;
  display: flex;
  align-items: flex-end;
  gap: 6px;
  margin-bottom: 16px;
}

.bar-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: center;
  height: 100%;
  gap: 8px;
}

.bar {
  width: 100%;
  border-radius: 8px 8px 0 0;
  background: linear-gradient(180deg, #6366f1 0%, #4f46e5 100%);
  min-height: 6px;
  box-shadow: 0 2px 8px rgba(99, 102, 241, 0.2);
  transition: all 0.3s ease;
}

body.dark .bar {
  background: linear-gradient(180deg, #a78bfa 0%, #9f7aea 100%);
  box-shadow: 0 2px 8px rgba(167, 139, 250, 0.3);
}

.label {
  font-size: 11px;
  font-weight: 600;
  opacity: 0.5;
  text-transform: uppercase;
  letter-spacing: 0.4px;
}

.days-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 8px;
  margin-bottom: 12px;
}

.day-card {
  background: rgba(255, 255, 255, 0.4);
  backdrop-filter: blur(10px);
  border-radius: 14px;
  padding: 12px 8px;
  text-align: center;
  border: 1.5px solid rgba(255, 255, 255, 0.3);
  cursor: pointer;
  transition: all 0.2s ease;
  min-height: 70px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}

body.dark .day-card {
  background: rgba(255, 255, 255, 0.04);
  border-color: rgba(255, 255, 255, 0.08);
}

.day-card:active {
  background: linear-gradient(135deg, #6366f1 0%, #818cf8 100%);
  color: white;
  border-color: #6366f1;
  transform: scale(0.98);
}

.day-name {
  font-size: 10px;
  font-weight: 700;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  margin-bottom: 4px;
}

.day-minutes {
  font-size: 18px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.day-label {
  font-size: 9px;
  opacity: 0.4;
  margin-top: 2px;
  font-weight: 500;
}

.bottom {
  display: flex;
  gap: 10px;
}

button.main {
  flex: 1;
  height: 54px;
  border: none;
  border-radius: 16px;
  background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
  color: white;
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.3s ease;
  box-shadow: 0 6px 20px rgba(99, 102, 241, 0.25);
  letter-spacing: -0.3px;
  font-family: inherit;
}

body.dark button.main {
  box-shadow: 0 6px 20px rgba(167, 139, 250, 0.3);
}

button.main:active {
  transform: translateY(-2px);
  box-shadow: 0 10px 28px rgba(99, 102, 241, 0.35);
}

/* Modal */
.modal {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(0, 0, 0, 0.4);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 2000;
  padding: 20px;
  animation: fadeIn 0.3s ease;
}

.modal.open {
  display: flex;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.modal-content {
  background: white;
  border-radius: 24px;
  padding: 32px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
  animation: slideUp 0.3s ease;
}

body.dark .modal-content {
  background: #1a2332;
  box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
}

@keyframes slideUp {
  from {
    transform: translateY(20px);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

.modal-content h2 {
  margin-bottom: 24px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: -0.3px;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 8px;
  opacity: 0.6;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-group input {
  width: 100%;
  padding: 12px 16px;
  border-radius: 12px;
  border: 1.5px solid #e2e8f0;
  background: #f9fafb;
  color: #1a202c;
  font-size: 16px;
  font-weight: 500;
  font-family: inherit;
  transition: all 0.3s ease;
}

body.dark .form-group input {
  background: #0f1419;
  color: #f3f4f6;
  border-color: #2d3748;
}

.form-group input:focus {
  outline: none;
  border-color: #6366f1;
  box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
}

.form-buttons {
  display: flex;
  gap: 12px;
  margin-top: 28px;
}

.form-buttons button {
  flex: 1;
  padding: 12px;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  transition: all 0.2s;
}

.cancel-btn {
  background: #f0f4f8;
  color: #1a202c;
  border: 1.5px solid #e2e8f0;
}

body.dark .cancel-btn {
  background: #2d3748;
  color: #f3f4f6;
  border-color: #3d4758;
}

.save-btn {
  background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
  color: white;
  box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
}

svg {
  width: 22px;
  height: 22px;
  stroke-linecap: round;
  stroke-linejoin: round;
}
</style>
</head>
<body>
<div class="clouds">
  <div class="cloud-shape c1"></div>
  <div class="cloud-shape c2"></div>
  <div class="cloud-shape c3"></div>
</div>

<div class="app">
  <div class="top">
    <button class="iconbtn" id="themeBtn">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"></svg>
    </button>
    <div class="app-title">Meditation</div>
    <div style="width: 44px"></div>
  </div>

  <div class="card">
    <div class="streak" id="streak">0 Day Streak</div>
    <div class="sub">Keep going</div>
  </div>

  <div class="week-nav">
    <button class="nav-btn" id="prevBtn">←</button>
    <div class="week-info">
      <div class="week-label" id="weekLabel">This Week</div>
      <div class="week-total" id="weekTotal">0 min</div>
    </div>
    <button class="nav-btn" id="nextBtn">→</button>
  </div>

  <div class="card chart-card">
    <div class="chart" id="chart"></div>
    <div class="days-grid" id="daysGrid"></div>
  </div>

  <div class="bottom">
    <button class="main" id="addBtn">Add Session</button>
  </div>
</div>

<!-- Modal -->
<div class="modal" id="modal">
  <div class="modal-content">
    <h2>Add Session</h2>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="modalDate">
    </div>
    <div class="form-group">
      <label>Minutes</label>
      <input type="number" id="modalMinutes" placeholder="Enter minutes" min="1">
    </div>
    <div class="form-buttons">
      <button class="cancel-btn" id="cancelBtn">Cancel</button>
      <button class="save-btn" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<script>
  let sessions = JSON.parse(localStorage.getItem('meditationSessions') || '[]');
  let dark = JSON.parse(localStorage.getItem('darkMode') || 'false');
  let weekOffset = 0;

  const themeBtn = document.getElementById('themeBtn');
  const themeIcon = document.getElementById('themeIcon');
  const addBtn = document.getElementById('addBtn');
  const modal = document.getElementById('modal');
  const modalDate = document.getElementById('modalDate');
  const modalMinutes = document.getElementById('modalMinutes');
  const cancelBtn = document.getElementById('cancelBtn');
  const saveBtn = document.getElementById('saveBtn');
  const prevBtn = document.getElementById('prevBtn');
  const nextBtn = document.getElementById('nextBtn');
  const chart = document.getElementById('chart');
  const daysGrid = document.getElementById('daysGrid');
  const weekLabel = document.getElementById('weekLabel');
  const weekTotal = document.getElementById('weekTotal');
  const streakNum = document.getElementById('streak');

  function updateIcon() {
    if (dark) {
      themeIcon.innerHTML = '<path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/>';
    } else {
      themeIcon.innerHTML = '<circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/>';
    }
  }

  function formatDate(date) {
    return date.toISOString().split('T')[0];
  }

  function getWeekDates(offset = 0) {
    const now = new Date();
    const current = new Date(now);
    current.setDate(current.getDate() - current.getDay() + 1 + offset * 7);
    const dates = [];
    for (let i = 0; i < 7; i++) {
      const date = new Date(current);
      date.setDate(date.getDate() + i);
      dates.push(date);
    }
    return dates;
  }

  function getWeekLabel(offset) {
    if (offset === 0) return 'This Week';
    if (offset === -1) return 'Last Week';
    if (offset > 0) return `In ${offset} wk`;
    return `${Math.abs(offset)} wks ago`;
  }

  function calculateStreak() {
    let streak = 0;
    let current = new Date();
    current.setHours(0, 0, 0, 0);

    for (let i = 0; i < 365; i++) {
      const dateStr = formatDate(current);
      const session = sessions.find(s => s.date === dateStr);
      if (!session || session.minutes === 0) break;
      streak++;
      current.setDate(current.getDate() - 1);
    }
    return streak;
  }

  function saveData() {
    localStorage.setItem('meditationSessions', JSON.stringify(sessions));
    localStorage.setItem('darkMode', JSON.stringify(dark));
  }

  function render() {
    document.body.classList.toggle('dark', dark);
    updateIcon();

    const weekDates = getWeekDates(weekOffset);
    const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
    
    const weekData = weekDates.map(date => {
      const dateStr = formatDate(date);
      const session = sessions.find(s => s.date === dateStr);
      return {
        date: dateStr,
        day: days[(date.getDay() + 6) % 7],
        minutes: session ? session.minutes : 0
      };
    });

    const total = weekData.reduce((sum, d) => sum + d.minutes, 0);
    const maxMinutes = Math.max(...weekData.map(d => d.minutes), 30);
    const streak = calculateStreak();

    streakNum.textContent = `${streak} Day Streak`;
    weekLabel.textContent = getWeekLabel(weekOffset);
    weekTotal.textContent = `${total} min`;

    // Render chart
    chart.innerHTML = weekData.map(d => {
      const height = maxMinutes > 0 ? (d.minutes / maxMinutes) * 180 : 0;
      return `<div class="bar-wrap">
        <div class="bar" style="height: ${height}px"></div>
        <div class="label">${d.day}</div>
      </div>`;
    }).join('');

    // Render days grid
    daysGrid.innerHTML = weekData.map((d, idx) => {
      return `<div class="day-card" onclick="editDay('${d.date}')">
        <div class="day-name">${d.day}</div>
        <div class="day-minutes">${d.minutes > 0 ? d.minutes : '—'}</div>
        <div class="day-label">${d.minutes > 0 ? 'min' : 'rest'}</div>
      </div>`;
    }).join('');

    saveData();
  }

  function editDay(dateStr) {
    const session = sessions.find(s => s.date === dateStr);
    const minutes = prompt('Minutes:', session ? session.minutes : 0);
    
    if (minutes === null) return;
    
    sessions = sessions.filter(s => s.date !== dateStr);
    const parsed = parseInt(minutes);
    if (parsed > 0) {
      sessions.push({ date: dateStr, minutes: parsed });
      sessions.sort((a, b) => a.date.localeCompare(b.date));
    }
    render();
  }

  themeBtn.addEventListener('click', () => {
    dark = !dark;
    render();
  });

  addBtn.addEventListener('click', () => {
    const today = new Date();
    modalDate.value = formatDate(today);
    modalMinutes.value = '';
    modal.classList.add('open');
    setTimeout(() => modalMinutes.focus(), 100);
  });

  cancelBtn.addEventListener('click', () => {
    modal.classList.remove('open');
  });

  saveBtn.addEventListener('click', () => {
    const date = modalDate.value;
    const minutes = parseInt(modalMinutes.value);

    if (!date || !minutes || minutes <= 0) return;

    sessions = sessions.filter(s => s.date !== date);
    sessions.push({ date, minutes });
    sessions.sort((a, b) => a.date.localeCompare(b.date));
    
    modal.classList.remove('open');
    render();
  });

  prevBtn.addEventListener('click', () => {
    weekOffset--;
    render();
  });

  nextBtn.addEventListener('click', () => {
    weekOffset++;
    render();
  });

  // Keyboard support for modal
  modalMinutes.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') saveBtn.click();
  });

  render();
</script>
</body>
</html>
