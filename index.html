<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Meditation">
  <title>Meditation Tracker</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/recharts@2.10.0/dist/Recharts.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body, #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, Area, AreaChart } = window.Recharts;

    const MeditationTracker = () => {
      const [sessions, setSessions] = useState([]);
      const [darkMode, setDarkMode] = useState(false);
      const [showAddModal, setShowAddModal] = useState(false);
      const [currentDate, setCurrentDate] = useState(new Date());
      const [minutes, setMinutes] = useState('');
      const [weekOffset, setWeekOffset] = useState(0);
      const [swipedIndex, setSwipedIndex] = useState(null);
      const [editDate, setEditDate] = useState('');
      const [editMinutes, setEditMinutes] = useState('');
      const [menuOpen, setMenuOpen] = useState(false);
      const touchStartX = useRef(null);

      useEffect(() => {
        const saved = localStorage.getItem('meditationSessions');
        if (saved) setSessions(JSON.parse(saved));
        const savedDarkMode = localStorage.getItem('darkMode');
        if (savedDarkMode) setDarkMode(JSON.parse(savedDarkMode));
      }, []);

      useEffect(() => {
        localStorage.setItem('meditationSessions', JSON.stringify(sessions));
      }, [sessions]);

      useEffect(() => {
        localStorage.setItem('darkMode', JSON.stringify(darkMode));
      }, [darkMode]);

      const formatDate = (date) => date.toISOString().split('T')[0];

      const getWeekDates = (offset = 0) => {
        const now = new Date();
        const current = new Date(now);
        current.setDate(current.getDate() - current.getDay() + 1 + offset * 7);
        const dates = [];
        for (let i = 0; i < 7; i++) {
          const date = new Date(current);
          date.setDate(date.getDate() + i);
          dates.push(date);
        }
        return dates;
      };

      const weekDates = getWeekDates(weekOffset);
      const chartData = weekDates.map((date) => {
        const dateStr = formatDate(date);
        const session = sessions.find((s) => s.date === dateStr);
        return {
          date: dateStr,
          day: date.toLocaleDateString('en-US', { weekday: 'short' }),
          minutes: session ? session.minutes : 0,
        };
      });

      const calculateStreak = () => {
        let streak = 0;
        let current = new Date();
        current.setHours(0, 0, 0, 0);

        for (let i = 0; i < 365; i++) {
          const dateStr = formatDate(current);
          const session = sessions.find((s) => s.date === dateStr);
          if (!session || session.minutes === 0) break;
          streak++;
          current.setDate(current.getDate() - 1);
        }
        return streak;
      };

      const weekTotal = chartData.reduce((sum, day) => sum + day.minutes, 0);

      const getWeekLabel = () => {
        if (weekOffset === 0) return 'This Week';
        if (weekOffset === -1) return 'Last Week';
        if (weekOffset > 0) return `In ${weekOffset} week${weekOffset > 1 ? 's' : ''}`;
        return `${Math.abs(weekOffset)} week${Math.abs(weekOffset) > 1 ? 's' : ''} ago`;
      };

      const handleAddSession = () => {
        const dateStr = formatDate(currentDate);
        if (!minutes || isNaN(parseInt(minutes))) return;

        const newSession = { date: dateStr, minutes: parseInt(minutes) };
        const filtered = sessions.filter((s) => s.date !== dateStr);
        setSessions([...filtered, newSession].sort((a, b) => a.date.localeCompare(b.date)));
        setMinutes('');
        setShowAddModal(false);
        setCurrentDate(new Date());
      };

      const handleTouchStart = (e, index) => {
        touchStartX.current = e.touches[0].clientX;
      };

      const handleTouchEnd = (e, index) => {
        if (!touchStartX.current) return;
        const touchEndX = e.changedTouches[0].clientX;
        const diff = touchStartX.current - touchEndX;

        if (Math.abs(diff) > 50) {
          if (swipedIndex === index) {
            setSwipedIndex(null);
          } else {
            setSwipedIndex(index);
            setEditDate(chartData[index].date);
            setEditMinutes(chartData[index].minutes.toString());
          }
        }
        touchStartX.current = null;
      };

      const handleSaveEdit = () => {
        const newMinutes = parseInt(editMinutes);
        if (isNaN(newMinutes)) return;

        const newSession = { date: editDate, minutes: newMinutes };
        const filtered = sessions.filter((s) => s.date !== editDate);
        setSessions([...filtered, newSession].sort((a, b) => a.date.localeCompare(b.date)));
        setSwipedIndex(null);
      };

      const handleDeleteSession = (date) => {
        setSessions(sessions.filter((s) => s.date !== date));
        setSwipedIndex(null);
      };

      const handleExportCSV = () => {
        const csv = ['date,minutes', ...sessions.map((s) => `${s.date},${s.minutes}`)].join('\n');
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `meditation-${formatDate(new Date())}.csv`;
        a.click();
        setMenuOpen(false);
      };

      const streak = calculateStreak();
      const theme = darkMode
        ? {
            bg: '#0f1419',
            bgSecondary: '#1a2332',
            text: '#e8eaed',
            textSecondary: '#9ca3af',
            accent: '#a78bfa',
            border: '#2d3748',
            chartColor: '#a78bfa',
          }
        : {
            bg: '#fafbfc',
            bgSecondary: '#f0f4f8',
            text: '#1a202c',
            textSecondary: '#718096',
            accent: '#6366f1',
            border: '#e2e8f0',
            chartColor: '#6366f1',
          };

      return (
        <div style={{
          minHeight: '100vh',
          backgroundColor: theme.bg,
          color: theme.text,
          transition: 'all 0.4s ease',
          padding: '16px',
          fontFamily: 'inherit',
          overflowY: 'auto',
          WebkitTouchCallout: 'none',
          WebkitUserSelect: 'none',
        }}>
          {/* Top Bar */}
          <div style={{
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            marginBottom: '32px',
            position: 'relative',
          }}>
            <div
              onClick={() => setDarkMode(!darkMode)}
              style={{
                cursor: 'pointer',
                fontSize: '28px',
                position: 'relative',
                width: '50px',
                height: '50px',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                transition: 'transform 0.3s ease',
              }}
              onTouchStart={(e) => e.currentTarget.style.transform = 'scale(0.95)'}
              onTouchEnd={(e) => e.currentTarget.style.transform = 'scale(1)'}
            >
              {darkMode ? (
                <div style={{ position: 'relative' }}>
                  🌙
                  <span style={{
                    position: 'absolute',
                    top: '-8px',
                    right: '-15px',
                    fontSize: '14px',
                    animation: 'float 3s ease-in-out infinite',
                  }}>☁️</span>
                  <span style={{
                    position: 'absolute',
                    bottom: '-5px',
                    right: '-20px',
                    fontSize: '12px',
                    animation: 'float 4s ease-in-out infinite 0.5s',
                  }}>☁️</span>
                </div>
              ) : (
                '☀️'
              )}
            </div>

            <button
              onClick={() => setMenuOpen(!menuOpen)}
              style={{
                background: 'none',
                border: 'none',
                color: theme.text,
                fontSize: '24px',
                cursor: 'pointer',
                padding: '8px',
              }}
              onTouchStart={(e) => e.currentTarget.style.transform = 'scale(0.95)'}
              onTouchEnd={(e) => e.currentTarget.style.transform = 'scale(1)'}
            >
              ⋮
            </button>

            {menuOpen && (
              <div style={{
                position: 'absolute',
                top: '50px',
                right: '0',
                backgroundColor: theme.bgSecondary,
                border: `1px solid ${theme.border}`,
                borderRadius: '8px',
                padding: '12px 0',
                minWidth: '150px',
                zIndex: 1000,
                boxShadow: '0 4px 12px rgba(0,0,0,0.15)',
              }}>
                <button
                  onClick={() => {
                    handleExportCSV();
                  }}
                  style={{
                    width: '100%',
                    padding: '12px 16px',
                    background: 'none',
                    border: 'none',
                    color: theme.text,
                    cursor: 'pointer',
                    textAlign: 'left',
                    fontSize: '14px',
                  }}
                >
                  📥 Export CSV
                </button>
              </div>
            )}
          </div>

          {/* Streak Card */}
          <div style={{
            backgroundColor: theme.bgSecondary,
            borderRadius: '16px',
            padding: '20px',
            marginBottom: '32px',
            border: `1px solid ${theme.border}`,
          }}>
            <div style={{
              fontSize: '28px',
              marginBottom: '8px',
              fontWeight: '600',
            }}>
              🔥 {streak} Day Streak
            </div>
            <div style={{
              color: theme.textSecondary,
              fontSize: '14px',
              fontWeight: '500',
            }}>
              {streak > 0 ? 'Keep it going!' : 'Start your meditation journey today'}
            </div>
          </div>

          {/* Week Navigation & Stats */}
          <div style={{
            display: 'flex',
            justifyContent: 'space-between',
            alignItems: 'center',
            marginBottom: '20px',
          }}>
            <button
              onClick={() => setWeekOffset(weekOffset - 1)}
              style={{
                background: 'none',
                border: 'none',
                color: theme.accent,
                fontSize: '20px',
                cursor: 'pointer',
                padding: '8px',
              }}
            >
              ◀
            </button>
            <div style={{
              textAlign: 'center',
              flex: 1,
            }}>
              <div style={{
                fontSize: '16px',
                fontWeight: '600',
                marginBottom: '4px',
              }}>
                {getWeekLabel()}
              </div>
              <div style={{
                fontSize: '24px',
                fontWeight: '700',
                color: theme.accent,
              }}>
                {weekTotal} min
              </div>
            </div>
            <button
              onClick={() => setWeekOffset(weekOffset + 1)}
              style={{
                background: 'none',
                border: 'none',
                color: theme.accent,
                fontSize: '20px',
                cursor: 'pointer',
                padding: '8px',
              }}
            >
              ▶
            </button>
          </div>

          {/* Chart */}
          <div style={{
            backgroundColor: theme.bgSecondary,
            borderRadius: '16px',
            padding: '20px',
            marginBottom: '24px',
            border: `1px solid ${theme.border}`,
          }}>
            <ResponsiveContainer width="100%" height={240}>
              <AreaChart data={chartData}>
                <defs>
                  <linearGradient id="colorMinutes" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="5%" stopColor={theme.chartColor} stopOpacity={0.3} />
                    <stop offset="95%" stopColor={theme.chartColor} stopOpacity={0} />
                  </linearGradient>
                </defs>
                <CartesianGrid strokeDasharray="3 3" stroke={theme.border} />
                <XAxis dataKey="day" stroke={theme.textSecondary} style={{ fontSize: '12px' }} />
                <YAxis stroke={theme.textSecondary} style={{ fontSize: '12px' }} />
                <Tooltip
                  contentStyle={{
                    backgroundColor: theme.bgSecondary,
                    border: `1px solid ${theme.border}`,
                    borderRadius: '8px',
                    color: theme.text,
                  }}
                  cursor={{ stroke: theme.accent, strokeWidth: 2 }}
                />
                <Area
                  type="monotone"
                  dataKey="minutes"
                  stroke={theme.chartColor}
                  strokeWidth={3}
                  fillOpacity={1}
                  fill="url(#colorMinutes)"
                  isAnimationActive={true}
                  animationDuration={800}
                />
              </AreaChart>
            </ResponsiveContainer>
          </div>

          {/* Chart Days with Swipe */}
          <div style={{
            display: 'grid',
            gridTemplateColumns: 'repeat(7, 1fr)',
            gap: '8px',
            marginBottom: '24px',
          }}>
            {chartData.map((day, idx) => (
              <div key={idx}>
                {swipedIndex !== idx ? (
                  <div
                    onTouchStart={(e) => handleTouchStart(e, idx)}
                    onTouchEnd={(e) => handleTouchEnd(e, idx)}
                    onClick={() => {
                      setSwipedIndex(idx);
                      setEditDate(day.date);
                      setEditMinutes(day.minutes.toString());
                    }}
                    style={{
                      backgroundColor: theme.bgSecondary,
                      borderRadius: '12px',
                      padding: '12px 8px',
                      textAlign: 'center',
                      cursor: 'pointer',
                      border: `1px solid ${theme.border}`,
                      minHeight: '80px',
                      display: 'flex',
                      flexDirection: 'column',
                      justifyContent: 'center',
                      alignItems: 'center',
                      transition: 'all 0.2s',
                    }}
                    onTouchStart={(e) => e.currentTarget.style.backgroundColor = theme.accent}
                    onTouchEnd={(e) => e.currentTarget.style.backgroundColor = theme.bgSecondary}
                  >
                    <div style={{ fontSize: '12px', fontWeight: '500', marginBottom: '4px', opacity: 0.7 }}>
                      {day.day}
                    </div>
                    <div style={{ fontSize: '20px', fontWeight: '700' }}>
                      {day.minutes > 0 ? day.minutes : '—'}
                    </div>
                    <div style={{ fontSize: '10px', opacity: 0.5, marginTop: '2px' }}>
                      {day.minutes > 0 ? 'min' : 'rest'}
                    </div>
                  </div>
                ) : (
                  <div style={{
                    backgroundColor: theme.bgSecondary,
                    borderRadius: '12px',
                    padding: '12px 8px',
                    border: `1px solid ${theme.accent}`,
                    minHeight: '80px',
                    display: 'flex',
                    flexDirection: 'column',
                    gap: '8px',
                  }}>
                    <input
                      type="number"
                      value={editMinutes}
                      onChange={(e) => setEditMinutes(e.target.value)}
                      style={{
                        padding: '6px',
                        borderRadius: '6px',
                        border: `1px solid ${theme.border}`,
                        backgroundColor: theme.bg,
                        color: theme.text,
                        fontSize: '14px',
                        textAlign: 'center',
                        fontWeight: '700',
                      }}
                      placeholder="Minutes"
                    />
                    <div style={{ display: 'flex', gap: '6px' }}>
                      <button
                        onClick={() => handleSaveEdit()}
                        style={{
                          flex: 1,
                          padding: '6px',
                          backgroundColor: theme.accent,
                          color: 'white',
                          border: 'none',
                          borderRadius: '6px',
                          cursor: 'pointer',
                          fontSize: '12px',
                          fontWeight: '600',
                        }}
                      >
                        ✓
                      </button>
                      <button
                        onClick={() => handleDeleteSession(editDate)}
                        style={{
                          flex: 1,
                          padding: '6px',
                          backgroundColor: '#ef4444',
                          color: 'white',
                          border: 'none',
                          borderRadius: '6px',
                          cursor: 'pointer',
                          fontSize: '12px',
                          fontWeight: '600',
                        }}
                      >
                        🗑️
                      </button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>

          {/* Add Button */}
          <button
            onClick={() => {
              setShowAddModal(true);
              setCurrentDate(new Date());
              setMinutes('');
            }}
            style={{
              width: '100%',
              padding: '16px',
              backgroundColor: theme.accent,
              color: 'white',
              border: 'none',
              borderRadius: '12px',
              fontSize: '18px',
              fontWeight: '700',
              cursor: 'pointer',
              transition: 'all 0.3s',
              boxShadow: `0 4px 12px rgba(0,0,0,0.1)`,
            }}
          >
            + Add Today
          </button>

          {/* Modal */}
          {showAddModal && (
            <div style={{
              position: 'fixed',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              backgroundColor: 'rgba(0,0,0,0.5)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              zIndex: 2000,
              padding: '20px',
            }}>
              <div style={{
                backgroundColor: theme.bgSecondary,
                borderRadius: '16px',
                padding: '28px',
                width: '100%',
                maxWidth: '400px',
                border: `1px solid ${theme.border}`,
              }}>
                <h2 style={{
                  marginTop: 0,
                  marginBottom: '24px',
                  fontSize: '20px',
                  fontWeight: '700',
                }}>
                  Add Session
                </h2>

                <div style={{ marginBottom: '20px' }}>
                  <label style={{
                    display: 'block',
                    fontSize: '14px',
                    fontWeight: '600',
                    marginBottom: '8px',
                    color: theme.textSecondary,
                  }}>
                    Date
                  </label>
                  <input
                    type="date"
                    value={formatDate(currentDate)}
                    onChange={(e) => setCurrentDate(new Date(e.target.value + 'T00:00:00'))}
                    style={{
                      width: '100%',
                      padding: '12px',
                      borderRadius: '8px',
                      border: `1px solid ${theme.border}`,
                      backgroundColor: theme.bg,
                      color: theme.text,
                      fontSize: '14px',
                      boxSizing: 'border-box',
                    }}
                  />
                </div>

                <div style={{ marginBottom: '24px' }}>
                  <label style={{
                    display: 'block',
                    fontSize: '14px',
                    fontWeight: '600',
                    marginBottom: '8px',
                    color: theme.textSecondary,
                  }}>
                    Minutes
                  </label>
                  <input
                    type="number"
                    value={minutes}
                    onChange={(e) => setMinutes(e.target.value)}
                    placeholder="Enter minutes"
                    style={{
                      width: '100%',
                      padding: '12px',
                      borderRadius: '8px',
                      border: `1px solid ${theme.border}`,
                      backgroundColor: theme.bg,
                      color: theme.text,
                      fontSize: '14px',
                      boxSizing: 'border-box',
                    }}
                    autoFocus
                  />
                </div>

                <div style={{
                  display: 'flex',
                  gap: '12px',
                }}>
                  <button
                    onClick={() => setShowAddModal(false)}
                    style={{
                      flex: 1,
                      padding: '12px',
                      backgroundColor: theme.border,
                      color: theme.text,
                      border: 'none',
                      borderRadius: '8px',
                      cursor: 'pointer',
                      fontSize: '14px',
                      fontWeight: '600',
                    }}
                  >
                    Cancel
                  </button>
                  <button
                    onClick={handleAddSession}
                    style={{
                      flex: 1,
                      padding: '12px',
                      backgroundColor: theme.accent,
                      color: 'white',
                      border: 'none',
                      borderRadius: '8px',
                      cursor: 'pointer',
                      fontSize: '14px',
                      fontWeight: '600',
                    }}
                  >
                    Save
                  </button>
                </div>
              </div>
            </div>
          )}

          <style>{`
            @keyframes float {
              0%, 100% { transform: translateY(0px); }
              50% { transform: translateY(-8px); }
            }
          `}</style>
        </div>
      );
    };

    ReactDOM.render(<MeditationTracker />, document.getElementById('root'));
  </script>
</body>
</html>
